name: 📰 Générer Journal Vidéo

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode de génération"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - demo
          - test
      publish:
        description: "Publier après génération ?"
        required: false
        default: "yes"
        type: choice
        options:
          - yes
          - no

  schedule:
    - cron: "0 7 * * *"

jobs:
  generate:
    name: 🎬 Pipeline News → Vidéo → Publication
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 Dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
          ffmpeg -version | head -1
          espeak-ng --version

      - name: 📦 Dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ -n "$YOUTUBE_TOKEN_JSON" ]; then
            pip install google-api-python-client google-auth-oauthlib
            echo "✅ YouTube API installée"
          fi
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      - name: 🧪 Tests rapides
        run: python3 test_pipeline.py --quick
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      - name: 🎬 Générer (mode demo)
        if: ${{ github.event.inputs.mode == 'demo' }}
        run: python3 run_pipeline.py --demo

      - name: 🎬 Générer (mode full)
        if: ${{ github.event.inputs.mode != 'demo' && github.event.inputs.mode != 'test' }}
        run: python3 run_pipeline.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      - name: 📤 Upload artifact
        if: ${{ github.event.inputs.mode != 'test' }}
        uses: actions/upload-artifact@v4
        with:
          name: journal-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 7
          if-no-files-found: error

      - name: 📺 Publier sur YouTube
        if: |
          github.event.inputs.mode != 'test' &&
          github.event.inputs.publish != 'no' &&
          env.YOUTUBE_TOKEN_JSON != ''
        run: |
          VIDEO=$(ls output/*.mp4 | head -1)
          python3 publish.py --video "$VIDEO" --platform youtube
        env:
          YOUTUBE_TOKEN_JSON:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_JSON: ${{ secrets.YOUTUBE_CLIENT_JSON }}

      - name: 📸 Publier sur Instagram
        if: |
          github.event.inputs.mode != 'test' &&
          github.event.inputs.publish != 'no' &&
          env.INSTAGRAM_TOKEN != ''
        run: |
          VIDEO=$(ls output/*.mp4 | head -1)
          python3 publish.py --video "$VIDEO" --platform instagram
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_TOKEN:   ${{ secrets.INSTAGRAM_TOKEN }}
          VIDEO_PUBLIC_URL:  ${{ secrets.VIDEO_PUBLIC_URL }}

      - name: 📊 Résumé
        if: always()
        run: |
          echo "## 📰 Journal Vidéo — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%d/%m/%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'full (cron)' }} |" >> $GITHUB_STEP_SUMMARY
          if ls output/*.mp4 2>/dev/null | grep -q mp4; then
            SIZE=$(du -sh output/*.mp4 2>/dev/null | cut -f1)
            echo "| Taille vidéo | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Vidéo disponible dans les Artifacts**" >> $GITHUB_STEP_SUMMARY
          fi
