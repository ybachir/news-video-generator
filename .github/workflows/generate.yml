name: 📰 Générer Journal Vidéo

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode de génération"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - demo
          - test

  schedule:
    - cron: "0 7 * * *"

# Un seul run de génération à la fois (un run manuel pendant le cron
# n'écrasera pas la release/artifact de l'autre)
concurrency:
  group: generate-journal
  cancel-in-progress: false

permissions:
  contents: write   # requis pour publier la release "latest"

jobs:
  generate:
    name: 🎬 Pipeline News → Vidéo
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 Dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core
          ffmpeg -version | head -1
          espeak-ng --version
          fc-list | grep -i dejavu || echo "⚠️ DejaVu non trouvée via fc-list"
          ls -la /usr/share/fonts/truetype/dejavu/ 2>&1 || echo "⚠️ Dossier dejavu absent"

      - name: 📦 Dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Tests rapides
        run: python3 test_pipeline.py --quick
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      - name: 🎬 Générer (mode demo)
        if: ${{ github.event.inputs.mode == 'demo' }}
        run: python3 run_pipeline.py --demo

      - name: 🎬 Générer (mode full / cron)
        if: ${{ github.event.inputs.mode != 'demo' && github.event.inputs.mode != 'test' }}
        run: python3 run_pipeline.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      - name: 📤 Upload artifact
        if: ${{ github.event.inputs.mode != 'test' }}
        uses: actions/upload-artifact@v4
        with:
          name: journal-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 7
          if-no-files-found: error

      # Release publique "latest" : URL stable et téléchargeable SANS être
      # connecté à GitHub (contrairement aux artifacts) — sert aussi de
      # VIDEO_PUBLIC_URL pour la publication Instagram (Meta exige une URL
      # publique du MP4). Uniquement pour les vrais runs (cron / full).
      - name: 🌐 Publier la release "latest"
        if: ${{ github.event.inputs.mode != 'demo' && github.event.inputs.mode != 'test' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MP4=$(ls output/*.mp4 | head -1)
          cp "$MP4" journal_latest.mp4
          [ -f output/metadata.json ] && cp output/metadata.json . || echo '{}' > metadata.json
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest journal_latest.mp4 metadata.json \
            --title "📰 Journal du $(date '+%d/%m/%Y')" \
            --notes "Dernière vidéo générée automatiquement le $(date '+%d/%m/%Y à %H:%M UTC').

          **Téléchargement direct :** [journal_latest.mp4](https://github.com/${{ github.repository }}/releases/download/latest/journal_latest.mp4)" \
            --latest
          echo "✅ Release publiée : https://github.com/${{ github.repository }}/releases/download/latest/journal_latest.mp4"

      - name: 📊 Résumé
        if: always()
        run: |
          echo "## 📰 Journal Vidéo — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%d/%m/%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'full (cron)' }} |" >> $GITHUB_STEP_SUMMARY
          if ls output/*.mp4 2>/dev/null | grep -q mp4; then
            SIZE=$(du -sh output/*.mp4 2>/dev/null | cut -f1)
            echo "| Taille vidéo | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Vidéo disponible dans les Artifacts**" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **Téléchargement direct : [journal_latest.mp4](https://github.com/${{ github.repository }}/releases/download/latest/journal_latest.mp4)**" >> $GITHUB_STEP_SUMMARY
          fi
