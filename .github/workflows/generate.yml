name: 📰 Générer Journal Vidéo

on:
  # ── Déclenchement manuel ──
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode de génération"
        required: false
        default: "full"
        type: choice
        options:
          - full    # RSS + Groq + edge-tts (recommandé)
          - demo    # News simulées, sans clés API
          - test    # Tests seulement, pas de vidéo

  # ── Cron quotidien — chaque matin à 7h00 UTC ──
  schedule:
    - cron: "0 7 * * *"

jobs:
  generate:
    name: 🎬 Pipeline News → Vidéo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      # ── 1. Checkout ──
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ──
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dépendances système (ffmpeg + espeak fallback) ──
      - name: 🔧 Dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
          ffmpeg -version | head -1
          espeak-ng --version

      # ── 4. Dépendances Python ──
      - name: 📦 Dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip list | grep -E "moviepy|Pillow|requests|feedparser|numpy|edge"

      # ── 5. Tests rapides ──
      - name: 🧪 Tests rapides
        run: python3 test_pipeline.py --quick
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      # ── 6. Générer la vidéo ──
      - name: 🎬 Générer le journal vidéo
        if: ${{ github.event.inputs.mode != 'test' }}
        run: |
          MODE=${{ github.event.inputs.mode || 'full' }}
          echo "▶ Mode : $MODE"
          python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          import news_video_generator as m
          from pathlib import Path

          # Mode demo : forcer les news simulées
          if '$MODE' == 'demo':
              m.CONFIG['GROQ_API_KEY'] = ''
              m.CONFIG['UNSPLASH_KEY'] = ''

          output_dir = Path('output')
          photos_dir = output_dir / 'photos'
          audio_dir  = output_dir / 'audio'
          for d in [output_dir, photos_dir, audio_dir]:
              d.mkdir(parents=True, exist_ok=True)

          script_data = m.get_news(m.CONFIG)
          photo_paths = m.get_photos(script_data, m.CONFIG, photos_dir)
          segments    = m.generate_all_audio(script_data, m.CONFIG, audio_dir)
          video_path  = m.build_video(segments, photo_paths, script_data, m.CONFIG, output_dir)

          size = os.path.getsize(video_path) / 1_000_000
          print(f'✅ Vidéo générée : {video_path} ({size:.1f} MB)')
          "
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      # ── 7. Upload artifact ──
      - name: 📤 Upload vidéo
        if: ${{ github.event.inputs.mode != 'test' }}
        uses: actions/upload-artifact@v4
        with:
          name: journal-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 7
          if-no-files-found: error

      # ── 8. Résumé ──
      - name: 📊 Résumé
        if: always()
        run: |
          echo "## 📰 Journal Vidéo — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%d/%m/%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'full (cron)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| News | 5 |" >> $GITHUB_STEP_SUMMARY
          if ls output/*.mp4 2>/dev/null | head -1 | grep -q mp4; then
            SIZE=$(du -sh output/*.mp4 2>/dev/null | cut -f1)
            echo "| Taille | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Vidéo disponible dans les Artifacts** (onglet Summary)" >> $GITHUB_STEP_SUMMARY
          fi
