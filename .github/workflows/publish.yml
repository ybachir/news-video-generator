name: 📤 Publier Journal Vidéo

on:
  workflow_run:
    workflows: ["📰 Générer Journal Vidéo"]
    types: [completed]

jobs:
  publish:
    name: 📺 Publication YouTube
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Ne publie que si le run de génération a réussi, et seulement pour les
    # déclenchements automatiques (cron) ou manuels en mode full — pas pour
    # les runs de test/demo qui ne produisent pas un vrai MP4 à publier.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'schedule' || github.event.workflow_run.event == 'workflow_dispatch')
    env:
      # Secrets exposés comme variables d'environnement au niveau du JOB :
      # c'est la seule façon fiable de les référencer ensuite dans les
      # conditions if: des steps (les secrets ne sont jamais lisibles
      # directement dans un if:, voir doc GitHub Actions).
      YOUTUBE_TOKEN_JSON:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
      YOUTUBE_CLIENT_JSON: ${{ secrets.YOUTUBE_CLIENT_JSON }}
      INSTAGRAM_USER_ID:   ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_TOKEN:     ${{ secrets.INSTAGRAM_TOKEN }}
      # URL publique du MP4 exigée par Meta : la release "latest" publiée
      # par generate.yml fournit une URL stable — plus besoin de CDN externe.
      VIDEO_PUBLIC_URL:    https://github.com/${{ github.repository }}/releases/download/latest/journal_latest.mp4

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Dépendances Python (publication)
        run: |
          pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth

      - name: ⬇️ Télécharger l'artifact du run de génération
        uses: actions/download-artifact@v4
        with:
          # Le nom de l'artifact contient le run_number du workflow de
          # génération (voir generate.yml : "journal-${{ github.run_number }}")
          # — on utilise le run_id du workflow déclencheur pour cibler le
          # bon run, peu importe le numéro exact de l'artifact.
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded
          merge-multiple: true

      - name: 🔍 Localiser le MP4 téléchargé
        id: locate
        run: |
          MP4=$(find downloaded -name "*.mp4" | head -1)
          if [ -z "$MP4" ]; then
            echo "❌ Aucun MP4 trouvé dans l'artifact"
            exit 1
          fi
          echo "Vidéo trouvée : $MP4 ($(du -h "$MP4" | cut -f1))"
          echo "video_path=$MP4" >> "$GITHUB_OUTPUT"

      - name: 📺 Publier sur YouTube
        if: ${{ env.YOUTUBE_TOKEN_JSON != '' }}
        run: |
          python3 publish.py --video "${{ steps.locate.outputs.video_path }}" --platform youtube

      - name: ⏭️ YouTube ignoré (secrets absents)
        if: ${{ env.YOUTUBE_TOKEN_JSON == '' }}
        run: |
          echo "⚠️ YOUTUBE_TOKEN_JSON absent — publication ignorée."
          echo "   Génère le token avec generate_youtube_token.py (en local) puis"
          echo "   ajoute YOUTUBE_TOKEN_JSON et YOUTUBE_CLIENT_JSON dans les secrets."

      - name: 📸 Publier sur Instagram Reels
        if: ${{ env.INSTAGRAM_TOKEN != '' }}
        run: |
          python3 publish.py --video "${{ steps.locate.outputs.video_path }}" \
            --platform instagram --public-url "$VIDEO_PUBLIC_URL"

      - name: ⏭️ Instagram ignoré (secrets absents)
        if: ${{ env.INSTAGRAM_TOKEN == '' }}
        run: |
          echo "⚠️ INSTAGRAM_TOKEN absent — publication Reels ignorée."
          echo "   Crée un compte Instagram Business + app Meta, puis ajoute"
          echo "   INSTAGRAM_USER_ID et INSTAGRAM_TOKEN dans les secrets."

      - name: 📊 Résumé
        if: always()
        run: |
          echo "## 📤 Publication — Run déclencheur #${{ github.event.workflow_run.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Déclenché par : ${{ github.event.workflow_run.event }}" >> "$GITHUB_STEP_SUMMARY"
